<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tüysüz Ailesi</title>
    <!-- Tailwind CSS (Tasarım için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (İkonlar için) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Seçim yapıldığında metnin arka plan rengi */
        ::selection {
            background-color: #fef3c7; /* amber-100 */
            color: #78350f; /* amber-900 */
        }
        /* Mobilde daha akıcı kaydırma için */
        .modal-scroll {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="min-h-screen bg-[#F8F9FA] text-slate-800 font-sans pb-12 md:pb-20">

    <!-- Üst Kısım - Zarif Başlık -->
    <header class="pt-12 md:pt-20 pb-10 md:pb-16 px-4 text-center">
        <h1 class="text-3xl md:text-5xl font-serif text-slate-900 uppercase tracking-[0.15em] md:tracking-[0.2em] mb-4">
            Tüysüz Ailesi
        </h1>
        <div class="w-12 md:w-16 h-[1px] bg-amber-600 mx-auto mb-4 md:mb-6"></div>
        <p class="text-slate-500 font-light tracking-wider uppercase text-xs md:text-sm">
            Kuşaktan Kuşağa, Bir Arada
        </p>
    </header>

    <!-- Ana İçerik - Minimalist Kart Galerisi -->
    <main class="max-w-6xl mx-auto px-4 md:px-8">
        <!-- Mobilde tek kolon, tablette 2 kolon, bilgisayarda 3 kolon -->
        <div id="kisi-listesi" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 md:gap-8">
            <!-- Kişiler buraya JavaScript ile eklenecek -->
        </div>
    </main>

    <!-- Açılır Pencere (Modal) - Editoryal Detay Görünümü -->
    <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-50 p-3 sm:p-4 md:p-8 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-4xl flex flex-col md:flex-row shadow-2xl rounded-2xl overflow-hidden max-h-[92vh] md:max-h-[90vh] relative">
            
            <!-- Mobilde Kapatma Butonu (Daha büyük ve belirgin) -->
            <button onclick="kapatModal()" class="absolute top-3 right-3 md:top-6 md:right-6 text-slate-500 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 md:bg-transparent md:hover:bg-transparent rounded-full p-2 transition-colors z-20 shadow-sm md:shadow-none">
                <i data-lucide="x" class="w-5 h-5 md:w-6 md:h-6" stroke-width="2"></i>
            </button>

            <!-- Sol Taraf - Fotoğraf Alanı (Sadece Masaüstü/Tablet) -->
            <div class="md:w-2/5 bg-slate-50 p-8 items-center justify-center border-r border-slate-100 relative hidden md:flex">
                <img id="modal-resim-masaustu" src="" alt="" class="w-full max-w-[250px] aspect-square object-cover rounded-full filter grayscale shadow-lg border-4 border-white" onerror="this.src='https://via.placeholder.com/250?text=Fotograf+Yok'"/>
            </div>

            <!-- Sağ Taraf - İçerik Alanı -->
            <!-- Mobilde kaydırmayı kolaylaştırmak için modal-scroll sınıfı eklendi -->
            <div class="w-full md:w-3/5 p-6 md:p-12 relative overflow-y-auto modal-scroll">
                
                <div class="mb-6 md:mb-10 pr-10 md:pr-8">
                    <!-- Mobilde resmi başlığın yanında göster -->
                    <div class="md:hidden flex items-center gap-4 mb-4">
                        <img id="modal-resim-mobil" src="" alt="" class="w-20 h-20 sm:w-24 sm:h-24 rounded-full object-cover filter grayscale border-2 border-slate-200 shadow-sm" onerror="this.src='https://via.placeholder.com/150?text=Fotograf+Yok'"/>
                        <div>
                            <h2 id="modal-isim-mobil" class="text-2xl sm:text-3xl font-serif text-slate-900 leading-tight"></h2>
                            <span id="modal-unvan-mobil" class="text-[10px] sm:text-xs uppercase tracking-widest text-amber-700 font-bold block mt-1"></span>
                        </div>
                    </div>

                    <!-- Masaüstü Başlık -->
                    <div class="hidden md:block">
                        <h2 id="modal-isim-masaustu" class="text-4xl font-serif text-slate-900 leading-tight"></h2>
                        <span id="modal-unvan-masaustu" class="text-sm uppercase tracking-widest text-amber-700 font-semibold block mt-3"></span>
                    </div>
                </div>

                <div class="space-y-6 md:space-y-8">
                    <!-- Hakkında Bölümü -->
                    <div>
                        <h3 class="flex items-center gap-2 text-[10px] md:text-xs font-semibold uppercase tracking-widest text-slate-900 mb-2 md:mb-3">
                            <i data-lucide="book-open" class="w-4 h-4 text-amber-600"></i> Hakkında
                        </h3>
                        <p id="modal-hakkinda" class="text-slate-600 leading-relaxed font-light text-sm md:text-[15px]"></p>
                    </div>

                    <!-- İlginç Detay Bölümü (Varsa gösterilecek) -->
                    <div id="modal-detay-alani" class="hidden">
                        <div class="w-full h-[1px] bg-slate-100 mb-6 md:mb-8"></div>
                        <h3 class="flex items-center gap-2 text-[10px] md:text-xs font-semibold uppercase tracking-widest text-slate-900 mb-2 md:mb-3">
                            <i data-lucide="fingerprint" class="w-4 h-4 text-amber-600"></i> İlginç Bir Detay
                        </h3>
                        <p id="modal-detay" class="text-slate-600 leading-relaxed font-light text-sm md:text-[15px]"></p>
                    </div>

                    <!-- Favori Söz Bölümü (Varsa gösterilecek) -->
                    <div id="modal-soz-alani" class="hidden pt-2 md:pt-4">
                        <h3 class="flex items-center gap-2 text-[10px] md:text-xs font-semibold uppercase tracking-widest text-slate-400 mb-3 md:mb-4">
                            Sıkça Duyduğumuz Bir Söz
                        </h3>
                        <div class="flex gap-3 md:gap-4 items-start bg-slate-50 p-4 md:p-6 rounded-r-lg md:rounded-r-xl border-l-2 border-amber-600">
                            <i data-lucide="quote" class="w-6 h-6 md:w-8 md:h-8 text-amber-200 flex-shrink-0" style="transform: rotate(180deg);"></i>
                            <p id="modal-soz" class="text-lg md:text-xl font-serif italic text-slate-800 pt-1"></p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript - Sitenin Mantığı -->
    <script>
        // SÜLALE ÜYELERİNİN BİLGİLERİ
        const familyMembers = [
            {
                id: 1,
                isim: "Nuri Tüysüz",
                unvan: "Ailenin Babası / Ulu Çınar",
                resim: "nuri.png",
                hakkinda: "Serkan, Servet, Sultan ve İsmail'in babası; Fevziye'nin kıymetli eşi. Ailemizin ulu çınarı ve hepimizin canı babası. Maalesef vefat etmiştir, büyük bir sevgi, saygı ve hasretle anıyoruz.",
                komikOzellik: "Ailenin temel direği, hatıraları her zaman kalbimizde yaşıyor.",
                favoriSoz: "Mekanı cennet olsun."
            },
            {
                id: 2,
                isim: "Fevziye Tüysüz",
                unvan: "Kraliçemiz / Anne",
                resim: "fevziye.png",
                hakkinda: "Ailenin kraliçesi, 4 erkek kardeşin (Serkan, Servet, Sultan, İsmail) annesi ve merhum Nuri Tüysüz'ün kıymetli eşi. Sülalemizin baş tacı.",
                komikOzellik: "",
                favoriSoz: "Allah sizi islah etsin"
            },
            {
                id: 3,
                isim: "Serkan Tüysüz",
                unvan: "En Büyük Oğul / Kuşçu",
                resim: "serkan.png",
                hakkinda: "Nuri ve Fevziye'nin en büyük oğlu. Ticaret hayatına perdecilikle devam eden Serkan, aynı zamanda tutkulu bir kuşçudur.",
                komikOzellik: "Ailenin ciddi duran ama tam bir şakacısıdır; esprileriyle girdiği her ortamın havasını anında değiştirir.",
                favoriSoz: ""
            },
            {
                id: 4,
                isim: "Servet Tüysüz",
                unvan: "Sülalenin Beyni",
                resim: "servet.png",
                hakkinda: "Nuri Tüysüz'ün 2. oğlu. Emlakçılık, sporculuk ve halı saha işletmeciliği yapıyor. Analitik zekası ve yönetsel becerileriyle 'Sülalenin Beyni' olarak bilinir.",
                komikOzellik: "Ailenin en stratejik ismi, her duruma ve soruna bir çözümü veya planı mutlaka vardır.",
                favoriSoz: ""
            },
            {
                id: 5,
                isim: "Sultan Tüysüz",
                unvan: "Ailenin Olmazsa Olmazı",
                resim: "sultan.png",
                hakkinda: "Nuri Tüysüz'ün 3. oğlu. Hem perdecilik hem de inşaat sektörüyle uğraşır. Ailenin olmazsa olmazlarındandır, aklıyla her şeyi pratik bir şekilde yapabilir.",
                komikOzellik: "Sülalenin gizli problem çözücüsü olmasının yanında, ciddi bir marka takıntısı vardır. Kaliteden ve markadan asla taviz vermez.",
                favoriSoz: ""
            },
            {
                id: 6,
                isim: "İsmail Tüysüz",
                unvan: "En Küçük Kardeş / Şaka Makinesi",
                resim: "ismail.png",
                hakkinda: "Dört kardeşin en küçüğü. İnşaat sektöründe fırtınalar estirir. Sülalede 'şaka' kelimesi geçince akla gelen ilk ve tek isimdir.",
                komikOzellik: "Dur durak bilmeyen şakacılığının yanı sıra, meşhur 'Armut Dağı'na olan sevdası dillere destandır.",
                favoriSoz: "Armut Dağı!"
            },
            {
                id: 7,
                isim: "Leyla Tüysüz",
                unvan: "En Büyük Gelin",
                resim: "leyla.png",
                hakkinda: "Nuri ve Fevziye'nin ilk ve en büyük gelini. Ailenin en sevilen üyelerinden biridir. Sadece kendi çocuklarına değil, yeri geldiğinde diğer gelinlerin çocuklarına da şefkatle annelik yapar. Ailenin diğer gelinleri gibi o da son derece hamarattır.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 8,
                isim: "Şeker Tüysüz",
                unvan: "Güler Yüzlü Gelin",
                resim: "seker.png",
                hakkinda: "Nuri ve Fevziye'nin gelinlerinden biri. Aile içinde güler yüzlülüğü ve bitmek bilmeyen enerjisiyle bilinir. Son derece hamarattır, tabiri caizse elinden her iş gelir.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 9,
                isim: "Hacer Tüysüz",
                unvan: "Genç Gelin",
                resim: "hacer.png",
                hakkinda: "Ailenin genç, hamarat ve en sevilen gelinleri arasındadır. Sülalenin enerjisine uyum sağlayan, sıcakkanlı ve kıymetli bir aile üyesidir.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 10,
                isim: "Ayşe Tüysüz",
                unvan: "En Küçük Gelin / Hamur Ustası",
                resim: "ayse.png",
                hakkinda: "Nuri ve Fevziye'nin en küçük gelini. Sülalede 'hamur işleri' dendiğinde akla ilk o gelir. Diğer eltileri gibi Ayşe de çok hamarattır ve mutfaktaki ustalığıyla bilinir.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 11,
                isim: "Hami Tüysüz",
                unvan: "İlk Torun",
                resim: "hami.png",
                hakkinda: "Ailenin ilk ve en büyük torunudur. Geçmişteki sporculuğu ve atletik yapısıyla bilinir. Yakın zamanda düğünü olacaktır, ailemizin gurur kaynaklarındandır.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 12,
                isim: "Ebrar Tüysüz",
                unvan: "İlk Evlenen Torun",
                resim: "ebrar.png",
                hakkinda: "Ailenin ilk evlenen torunudur. Zeyd Seymen adında dünyalar tatlısı bir çocuğu vardır ve annelik ona çok yakışmıştır.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 23,
                isim: "Rümeysa Tüysüz",
                unvan: "Zeki ve Becerikli",
                resim: "rumeysa.png",
                hakkinda: "Zekası, pratikliği ve el becerisiyle her zaman ön plandadır. Ailenin yetenekli ve akıllı torunlarından biridir.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 13,
                isim: "Esma Tüysüz",
                unvan: "Çalışkan Torun",
                resim: "esma.png",
                hakkinda: "Ailenin en çalışkan torunlarından biridir. Şirket işlerinde ve emicelerine (amcalarına) ettiği büyük yardımlarla bilinir, tam bir görev insanıdır.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 14,
                isim: "Yusuf Tüysüz",
                unvan: "Ailenin Kurnazı",
                resim: "yusuf.png",
                hakkinda: "Ailenin en kurnaz ve pratik zekalı torunlarından biridir. İştahı oldukça açıktır, yemek yemeyi çok sever.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 15,
                isim: "Şeyda Tüysüz",
                unvan: "Mutfak Ustası",
                resim: "seyda.png",
                hakkinda: "El becerisiyle sülalede nam salmıştır. Mutfakta vakit geçirmeyi, harika tatlılar ve yemekler yapmayı çok sever.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 16,
                isim: "Melisa Tüysüz",
                unvan: "Narin Torun",
                resim: "melisa.png",
                hakkinda: "Şeyda'nın en sevdiği kuzenidir. Biraz utangaç bir yapısı olsa da ailenin en tatlı üyelerindendir.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 17,
                isim: "Berat Tüysüz",
                unvan: "Sporcu ve Yazılımcı",
                resim: "berat.png",
                hakkinda: "Sporculuğuyla ve atletik yetenekleriyle bilinmesinin yanı sıra, teknolojiye, yazılıma ve kodlamaya olan ilgisiyle ailenin parlayan yıldızlarındandır.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 18,
                isim: "Ömer Tüysüz",
                unvan: "Azimli Öğrenci",
                resim: "omer.png",
                hakkinda: "Ailenin en akıllılarındandır. LGS'ye hazırlık sürecindeki büyük azmi, disiplini ve çok çalışmasıyla herkesin takdirini toplamaktadır.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 24,
                isim: "Zehra Tüysüz",
                unvan: "Sevimli Torun",
                resim: "zehra.png",
                hakkinda: "Ahmet'in en yakın arkadaşıdır ve onunla çok iyi anlaşırlar. Son derece sevimli, neşe dolu bir aile üyesidir.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 19,
                isim: "Ahmet Tüysüz",
                unvan: "Atik ve Sevecen",
                resim: "ahmet.png",
                hakkinda: "Ailenin biraz fırlama ama bir o kadar da atik, yetenekli ve sevecen torunudur. Enerjisiyle ortama her zaman renk katar.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 20,
                isim: "Zeynep Tüysüz",
                unvan: "Küçük Kraliçe",
                resim: "zeynep.png",
                hakkinda: "Sülalenin küçük kraliçesi! Kendini herkese sevdiren, ailenin en gözde ve en sevilen üyelerinden biridir.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 21,
                isim: "Kerem Tüysüz",
                unvan: "En Küçük Torun",
                resim: "kerem.png",
                hakkinda: "Ailenin en küçük torunu, dünya tatlısı bir çocuktur. Görünüş olarak abisi Yusuf'a ve ablası Şeyda'ya çok benzer.",
                komikOzellik: "",
                favoriSoz: ""
            },
            {
                id: 22,
                isim: "Zeyd Seymen Tüysüz",
                unvan: "Ailenin Neşesi / Bebek",
                resim: "zeyd.png",
                hakkinda: "Ebrar Tüysüz'ün dünyalar tatlısı çocuğudur. 19 Mayıs'ta 1 yaşına girecektir. Ailedeki herkesin gözbebeğidir, inşallah dayısına çeker!",
                komikOzellik: "",
                favoriSoz: ""
            }
        ];

        // Sayfa yüklendiğinde kartları oluştur
        document.addEventListener('DOMContentLoaded', () => {
            const liste = document.getElementById('kisi-listesi');
            
            liste.innerHTML = familyMembers.map(kisi => `
                <div onclick="acModal(${kisi.id})" class="bg-white p-6 md:p-10 flex flex-col items-center text-center group cursor-pointer border border-slate-100 shadow-sm hover:shadow-xl hover:border-amber-200 transition-all duration-500 rounded-lg md:rounded-sm">
                    <div class="relative mb-4 md:mb-6">
                        <div class="absolute inset-0 rounded-full border border-slate-200 scale-110 group-hover:scale-100 group-hover:border-amber-400 transition-all duration-500"></div>
                        <img src="${kisi.resim}" alt="${kisi.isim}" class="w-24 h-24 md:w-32 md:h-32 rounded-full object-cover filter grayscale opacity-90 md:opacity-80 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700 shadow-md" onerror="this.src='https://via.placeholder.com/150?text=Fotograf+Yok'"/>
                    </div>
                    <h2 class="text-xl md:text-2xl font-serif text-slate-900 mb-1 md:mb-2">${kisi.isim}</h2>
                    <p class="text-[10px] md:text-xs uppercase tracking-widest text-amber-700 font-semibold mb-4 md:mb-6">${kisi.unvan}</p>
                    <div class="flex items-center text-[10px] md:text-xs text-slate-400 group-hover:text-amber-600 transition-colors uppercase tracking-widest gap-1 mt-auto">
                        Profili İncele <i data-lucide="chevron-right" class="w-4 h-4 transform group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            `).join('');

            // İkonları yükle
            lucide.createIcons();
        });

        const modal = document.getElementById('modal');

        // Modalı açma fonksiyonu
        function acModal(id) {
            const kisi = familyMembers.find(k => k.id === id);
            if (!kisi) return;

            // Fotoğraf ve İsim Bilgileri
            document.getElementById('modal-resim-masaustu').src = kisi.resim;
            document.getElementById('modal-resim-masaustu').alt = kisi.isim;
            document.getElementById('modal-resim-mobil').src = kisi.resim;
            document.getElementById('modal-resim-mobil').alt = kisi.isim;
            
            document.getElementById('modal-isim-masaustu').textContent = kisi.isim;
            document.getElementById('modal-unvan-masaustu').textContent = kisi.unvan;
            document.getElementById('modal-isim-mobil').textContent = kisi.isim;
            document.getElementById('modal-unvan-mobil').textContent = kisi.unvan;

            // Hakkında
            document.getElementById('modal-hakkinda').textContent = kisi.hakkinda;

            // İlginç Detay Görünümü
            const detayAlani = document.getElementById('modal-detay-alani');
            if (kisi.komikOzellik && kisi.komikOzellik.trim() !== "") {
                detayAlani.classList.remove('hidden');
                document.getElementById('modal-detay').textContent = kisi.komikOzellik;
            } else {
                detayAlani.classList.add('hidden');
            }

            // Söz Görünümü
            const sozAlani = document.getElementById('modal-soz-alani');
            if (kisi.favoriSoz && kisi.favoriSoz.trim() !== "") {
                sozAlani.classList.remove('hidden');
                document.getElementById('modal-soz').textContent = `"${kisi.favoriSoz}"`;
            } else {
                sozAlani.classList.add('hidden');
            }

            // Modalı Göster
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Mobilde arkadaki sayfanın kaymasını engelle
            document.body.style.overflow = 'hidden';

            // Animasyon için hafif bir gecikme
            setTimeout(() => {
                modal.classList.remove('opacity-0');
            }, 10);
        }

        // Modalı kapatma fonksiyonu
        function kapatModal() {
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                
                // Arka sayfanın kaydırmasını geri aç
                document.body.style.overflow = '';
            }, 300); // 300ms animasyon süresi
        }
        
        // Modalın dışına tıklanınca kapatma
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                kapatModal();
            }
        });
    </script>
</body>
</html>
